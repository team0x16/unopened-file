<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>unopened file</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; }
canvas { display:block; position:fixed; inset:0; }

/* ── INTRO ── */
#intro {
  position:fixed; inset:0; z-index:100;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:#000; cursor:pointer;
}
#intro-words {
  font-family: 'Georgia', serif;
  color:#fff; font-size:clamp(11px,1.5vw,14px);
  letter-spacing:.25em; line-height:2.4;
  text-align:center; max-width:380px;
  opacity:0; transform:translateY(6px);
  animation: fadeUp 1.8s ease 0.4s forwards;
}
#intro-words em { color:#c8b880; font-style:normal; font-size:1.3em; letter-spacing:.5em; }
#intro-tap {
  margin-top:48px; font-family:'Georgia',serif;
  color:#333; font-size:10px; letter-spacing:.4em;
  opacity:0; animation: fadeIn 1s ease 2.4s forwards;
}
@keyframes fadeUp {
  to { opacity:1; transform:translateY(0); }
}
@keyframes fadeIn { to { opacity:1; } }

/* ── FLASH ── */
#flash {
  position:fixed; inset:0; z-index:99;
  background:#fff; opacity:0; pointer-events:none;
}

/* ── HUD ── */
#hud {
  position:fixed; inset:0; pointer-events:none; z-index:50;
  opacity:0; transition:opacity 1.2s;
}
#days {
  position:absolute; bottom:20px; right:20px;
  font-family:'Georgia',serif; font-size:9px;
  color:#1e1408; letter-spacing:.22em;
}
#dots {
  position:absolute; top:18px; left:50%; transform:translateX(-50%);
  display:flex; gap:6px; align-items:center;
}
.d { width:4px; height:4px; border-radius:50%; background:#1a1008; transition:background .6s,box-shadow .6s; }
.d.lit { background:#c8a84a; box-shadow:0 0 6px #c8a84a88; }
#hearts {
  position:absolute; top:18px; left:18px;
  display:flex; gap:5px;
}
.h { width:8px; height:8px; border-radius:50%; background:#1a0808; transition:background .3s; }
.h.lit { background:#b03040; box-shadow:0 0 5px #b0304088; }

/* ── FRAGMENT TEXT ── */
#ftext {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-family:'Georgia',serif; font-size:clamp(13px,1.8vw,16px);
  color:#c8b880; line-height:2.1; text-align:center;
  letter-spacing:.07em; font-style:italic;
  max-width:420px; pointer-events:none;
  z-index:60; opacity:0; transition:opacity 1s;
}
#ftext small { display:block; margin-top:4px; color:#7a6840; font-size:.82em; }

/* ── ZONE NAME ── */
#zone {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  font-family:'Georgia',serif; font-size:9px; color:#1e1408;
  letter-spacing:.3em; pointer-events:none; z-index:50;
  opacity:0; transition:opacity .8s;
}

/* ── JOYSTICK ── */
#joy {
  position:fixed; bottom:28px; left:28px;
  width:120px; height:120px; border-radius:50%;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  z-index:80; touch-action:none;
  display:none;
}
#jknob {
  position:absolute; top:50%; left:50%;
  width:44px; height:44px; border-radius:50%;
  background:rgba(200,170,110,.14);
  border:1px solid rgba(200,170,110,.22);
  transform:translate(-50%,-50%);
  pointer-events:none;
}
#abtn {
  position:fixed; bottom:42px; right:32px;
  width:68px; height:68px; border-radius:50%;
  background:rgba(160,90,60,.1);
  border:1px solid rgba(180,110,80,.18);
  z-index:80; touch-action:none; display:none;
  align-items:center; justify-content:center;
  font-family:'Georgia',serif; font-size:11px;
  color:rgba(200,140,100,.35); letter-spacing:.1em;
}
#abtn.active { background:rgba(160,90,60,.28); color:rgba(255,180,140,.7); }

/* ── ROTATE ── */
#rotate {
  position:fixed; inset:0; z-index:200;
  background:#000; display:none;
  flex-direction:column; align-items:center; justify-content:center; gap:16px;
}
#rotate svg { opacity:.4; animation:rotSpin 2s ease-in-out infinite; }
#rotate p { font-family:'Georgia',serif; font-size:11px; color:#3a2a18; letter-spacing:.25em; }
@keyframes rotSpin { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-90deg)} }
</style>
</head>
<body>

<div id="rotate">
  <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
    <rect x="12" y="6" width="24" height="36" rx="3" stroke="#c8b880" stroke-width="1.5"/>
    <circle cx="24" cy="37" r="1.5" fill="#c8b880"/>
    <path d="M30 16 L38 16 M38 16 L35 13 M38 16 L35 19" stroke="#c8b880" stroke-width="1.2" stroke-linecap="round"/>
  </svg>
  <p>rotate device</p>
</div>

<div id="intro">
  <div id="intro-words">
    <em>unopened file</em><br><br>
    you edit. you compress.<br>
    you translate yourself<br>
    into something more receivable.<br><br>
    but the original file<br>
    sits somewhere inside you.<br>
    getting heavier.
  </div>
  <div id="intro-tap">tap anywhere to begin</div>
</div>

<div id="flash"></div>
<canvas id="c"></canvas>

<div id="hud">
  <div id="hearts"></div>
  <div id="dots"></div>
  <div id="days">remaining days · 44</div>
</div>
<div id="ftext"></div>
<div id="zone"></div>

<div id="joy"><div id="jknob"></div></div>
<div id="abtn">atk</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════════
const C = document.getElementById('c');
const X = C.getContext('2d');
let W = 0, H = 0;
let worldDirty = true;

function resize() {
  W = C.width  = window.innerWidth;
  H = C.height = window.innerHeight;
  worldDirty = true;
}
window.addEventListener('resize', () => { resize(); orientCheck(); });
resize();

// ═══════════════════════════════════════════════════════
// ORIENTATION
// ═══════════════════════════════════════════════════════
const TOUCH = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
function orientCheck() {
  if (!TOUCH) return;
  const portrait = window.innerHeight > window.innerWidth;
  document.getElementById('rotate').style.display = portrait ? 'flex' : 'none';
}
orientCheck();
window.addEventListener('orientationchange', () => setTimeout(orientCheck, 250));

// ═══════════════════════════════════════════════════════
// PROJECTION  — simple oblique isometric
// ═══════════════════════════════════════════════════════
const TW = 64, TH = 32, TWH = TW/2, THH = TH/2;
const WALLY = 18; // wall thickness in px
const PLIFT = 28; // player lift above surface

function w2s(wx, wy) {
  // world → screen, relative to camera
  return {
    x: W*0.5 + (wx - wy) * TWH,
    y: H*0.5 + (wx + wy) * THH
  };
}

// ═══════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════
const K = {};
window.addEventListener('keydown', e => {
  K[e.code] = true;
  if (['Space','KeyZ','KeyX'].includes(e.code)) { e.preventDefault(); doAttack(); }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { K[e.code] = false; });

// Virtual joystick state
const JOY = { x: 0, y: 0, on: false };

// ═══════════════════════════════════════════════════════
// WORLD — tile map
// ═══════════════════════════════════════════════════════
// Simple flat Map: "x,y" → type (0=floor, 1=raised, 2=void)
const TMAP = new Map();

function fill(x0, y0, x1, y1, t=0) {
  for (let x=x0; x<=x1; x++)
    for (let y=y0; y<=y1; y++)
      TMAP.set(x+','+y, t);
}
function raised(x0,y0,x1,y1) { fill(x0,y0,x1,y1,1); }
function pit(x0,y0,x1,y1)    { fill(x0,y0,x1,y1,2); }

// ── starting room ──
fill(-10,-10, 10,10);
raised(-7,-5,-4,-3); raised(3,4,7,7); raised(-5,5,-2,8);
raised(4,-8,8,-5);
pit(6,6,9,9); pit(-9,-9,-6,-7); pit(7,-4,10,-1);

// ── east corridor ──
fill(11,-3, 14,3);
fill(15,-13, 40,13);
raised(17,3,22,7); raised(25,-10,30,-6); raised(33,5,38,10);
raised(27,-3,32,2);
pit(19,-12,24,-8); pit(34,6,38,11); pit(38,-8,40,-4);

// ── east 2 ──
fill(41,-2, 43,2);
fill(44,-16, 75,16);
raised(46,5,52,9); raised(55,-13,61,-8); raised(64,8,70,12);
raised(52,-6,58,-1); raised(66,-5,72,1);
pit(59,6,64,11); pit(47,-15,53,-10); pit(71,7,74,12);

// ── final east ──
fill(76,-4, 78,4);
fill(79,-20, 115,20);
raised(82,-16,88,-11); raised(90,7,97,13); raised(100,-10,106,-5);
raised(108,4,113,9); raised(84,2,90,8);
pit(94,-18,100,-12); pit(83,10,90,15); pit(104,7,109,12);

// ── north wing ──
fill(-7,-11, 7,-18);
fill(-11,-19, 10,-36);
raised(-8,-22,-4,-19); raised(2,-29,6,-25); raised(-4,-34,-1,-31);
pit(-7,-30,-3,-26); pit(3,-35,7,-31);

// ── south wing ──
fill(-7,11, 7,18);
fill(-11,19, 10,36);
raised(-8,20,-4,24); raised(2,27,6,31); raised(-4,33,-1,35);
pit(4,21,7,25); pit(-7,30,-3,34);

// ── west wing ──
fill(-11,-7, -15,7);
fill(-16,-13, -38,13);
raised(-19,-9,-14,-5); raised(-25,4,-20,8); raised(-33,-4,-29,-1);
pit(-22,-12,-18,-8); pit(-31,5,-27,9);

// ── NE diagonal ──
fill(11,-11, 13,-14);
fill(14,-15, 33,-33);
raised(16,-18,20,-15); raised(22,-26,27,-22); raised(29,-32,32,-29);
pit(20,-25,24,-21); pit(28,-33,32,-30);

// ── SE diagonal ──
fill(11,11, 13,14);
fill(14,15, 33,33);
raised(16,16,20,20); raised(23,23,27,27); raised(29,30,32,32);
pit(20,20,24,24); pit(28,28,32,32);

// ── SW diagonal ──
fill(-11,11, -14,13);
fill(-15,15, -32,32);
raised(-18,16,-14,19); raised(-24,23,-20,26); raised(-29,29,-26,31);
pit(-20,21,-16,25); pit(-28,27,-25,30);

// ── NW diagonal ──
fill(-11,-11, -14,-13);
fill(-15,-15, -32,-33);
raised(-18,-19,-14,-16); raised(-24,-26,-20,-23); raised(-29,-32,-26,-29);
pit(-20,-24,-16,-20); pit(-28,-32,-25,-29);

// sorted for painter's algo
const TILES = [...TMAP.entries()]
  .map(([k,t]) => { const[x,y]=k.split(',').map(Number); return {x,y,t}; })
  .sort((a,b) => (a.x+a.y)-(b.x+b.y));

// ═══════════════════════════════════════════════════════
// FRAGMENTS
// ═══════════════════════════════════════════════════════
const FRAGS = [
  // start room
  { wx:-8, wy: 0, text:"you edit.", sub:"you compress." },
  { wx: 0, wy:-8, text:"you translate.", sub:"yourself into something more receivable." },
  { wx: 7, wy: 5, text:"the original file", sub:"sits unopened." },
  // east 1
  { wx:18, wy: 5, text:"people like you.", sub:"people trust you." },
  { wx:28, wy:-7, text:"a good friend.", sub:"that's what they'd call you." },
  { wx:35, wy: 7, text:"but the original file", sub:"they never received it." },
  // east 2
  { wx:48, wy: 7, text:"getting heavier", sub:"with every conversation\nthat almost touched it." },
  { wx:57, wy:-10, text:"you're not waiting", sub:"for someone to fix you." },
  { wx:66, wy: 9, text:"you're waiting", sub:"for someone who makes\ncompression feel unnecessary." },
  // final
  { wx:84, wy: 5, text:"someone who creates", sub:"enough silence." },
  { wx:95, wy:-8, text:"you don't know", sub:"if that person exists." },
  { wx:105, wy: 6, text:"you don't know", sub:"if you'd even recognize them." },
  // wings
  { wx: -5, wy:-25, text:"but you keep the file.", sub:"intact." },
  { wx: -5, wy: 25, text:"just in case.", sub:"remaining days · 44" },
  { wx:-26, wy: 5, text:"the calibrated version.", sub:"the one that knows when to be funny." },
].map((f,i) => ({ ...f, id:i, collected:false, phase:Math.random()*Math.PI*2 }));

// ── dots UI ──
const dotsEl = document.getElementById('dots');
FRAGS.forEach((_,i) => {
  const d = document.createElement('div');
  d.className='d'; d.id='d'+i;
  dotsEl.appendChild(d);
});

// ═══════════════════════════════════════════════════════
// ENEMIES
// ═══════════════════════════════════════════════════════
const ENEMIES = [
  // start
  {wx:-6,wy:6,sp:1.0,hp:3},{wx:6,wy:-6,sp:0.9,hp:3},{wx:-7,wy:-7,sp:1.0,hp:3},
  // east1
  {wx:20,wy:6,sp:1.1,hp:4},{wx:30,wy:-7,sp:1.0,hp:4},{wx:36,wy:4,sp:1.1,hp:4},
  // east2
  {wx:50,wy:-5,sp:1.2,hp:5},{wx:60,wy:9,sp:1.2,hp:5},{wx:68,wy:-4,sp:1.3,hp:5},
  // final
  {wx:88,wy:5,sp:1.4,hp:6},{wx:98,wy:-7,sp:1.5,hp:6},{wx:108,wy:5,sp:1.4,hp:6},
  // wings
  {wx:-5,wy:-22,sp:1.1,hp:4},{wx:-5,wy:22,sp:1.1,hp:4},
  {wx:-24,wy:0,sp:1.2,hp:4},{wx:20,wy:-18,sp:1.1,hp:4},
  {wx:20,wy:18,sp:1.1,hp:4},{wx:-18,wy:-18,sp:1.1,hp:4},
].map(e => ({...e, alive:true, maxHp:e.hp, hitT:0, vx:0, vy:0}));

// ═══════════════════════════════════════════════════════
// PLAYER
// ═══════════════════════════════════════════════════════
const P = {
  wx:0, wy:0,
  hp:5, maxHp:5,
  invT:0,          // invincibility timer
  atkT:0,          // attack timer (>0 = swinging)
  dead:false, deadT:0,
  bob:0,
  trail:[],
  lastDx:1, lastDy:0,  // last movement direction for attack
};
// ── hearts UI ──
const heartsEl = document.getElementById('hearts');
for (let i=0;i<P.maxHp;i++) {
  const h=document.createElement('div'); h.className='h lit'; h.id='hp'+i;
  heartsEl.appendChild(h);
}
function syncHearts() {
  for (let i=0;i<P.maxHp;i++)
    document.getElementById('hp'+i).className = 'h'+(i<P.hp?' lit':'');
}

// camera — smooth follow
const CAM = { wx:0, wy:0 };

// ═══════════════════════════════════════════════════════
// TILE SPRITE CACHE — one offscreen canvas per type
// ═══════════════════════════════════════════════════════
const SPR = {};
function buildSprites() {
  const types = { 0:'floor', 1:'raised', 2:'pit' };
  const colors = {
    0: { top:'#1c1830', lw:'#130e1c', rw:'#0f0b16', rim:'rgba(60,44,100,.22)' },
    1: { top:'#252040', lw:'#1a1430', rw:'#14102a', rim:'rgba(100,72,180,.38)' },
    2: { top:'#050310', lw:null,      rw:null,      rim:null },
  };
  const PW = TW+4, PH = TH+WALLY+6;
  const cx = PW/2, cy = THH+3;

  [0,1,2].forEach(t => {
    const oc = document.createElement('canvas');
    oc.width=PW; oc.height=PH;
    const ox = oc.getContext('2d');
    const c = colors[t];
    const hw=TWH, hh=THH;

    if (t===2) {
      // pit — dark diamond + subtle inner glow
      ox.fillStyle=c.top;
      ox.beginPath();
      ox.moveTo(cx,cy-hh); ox.lineTo(cx+hw,cy); ox.lineTo(cx,cy+hh); ox.lineTo(cx-hw,cy);
      ox.closePath(); ox.fill();
      ox.fillStyle='rgba(40,5,80,.18)';
      ox.beginPath();
      ox.moveTo(cx,cy-hh+4); ox.lineTo(cx+hw-5,cy); ox.lineTo(cx,cy+hh-4); ox.lineTo(cx-hw+5,cy);
      ox.closePath(); ox.fill();
    } else {
      // left wall
      ox.fillStyle=c.lw;
      ox.beginPath();
      ox.moveTo(cx-hw,cy); ox.lineTo(cx,cy+hh); ox.lineTo(cx,cy+hh+WALLY); ox.lineTo(cx-hw,cy+WALLY);
      ox.closePath(); ox.fill();
      // right wall
      ox.fillStyle=c.rw;
      ox.beginPath();
      ox.moveTo(cx+hw,cy); ox.lineTo(cx,cy+hh); ox.lineTo(cx,cy+hh+WALLY); ox.lineTo(cx+hw,cy+WALLY);
      ox.closePath(); ox.fill();
      // top
      ox.fillStyle=c.top;
      ox.beginPath();
      ox.moveTo(cx,cy-hh); ox.lineTo(cx+hw,cy); ox.lineTo(cx,cy+hh); ox.lineTo(cx-hw,cy);
      ox.closePath(); ox.fill();
      // rim
      ox.strokeStyle=c.rim; ox.lineWidth=1;
      ox.beginPath();
      ox.moveTo(cx,cy-hh); ox.lineTo(cx+hw,cy); ox.lineTo(cx,cy+hh); ox.lineTo(cx-hw,cy);
      ox.closePath(); ox.stroke();
      // subtle crack detail (deterministic per type)
      ox.save(); ox.globalAlpha=.06; ox.strokeStyle='#fff'; ox.lineWidth=.5;
      if (t===0) { ox.beginPath(); ox.moveTo(cx-hw*.3,cy-hh*.2); ox.lineTo(cx+hw*.15,cy+hh*.3); ox.stroke(); }
      if (t===1) { ox.beginPath(); ox.moveTo(cx+hw*.2,cy-hh*.3); ox.lineTo(cx-hw*.1,cy+hh*.2); ox.stroke(); }
      ox.restore();
    }
    SPR[t] = oc;
  });
}
buildSprites();

// ═══════════════════════════════════════════════════════
// WORLD OFFSCREEN — rendered once, blitted every frame
// ═══════════════════════════════════════════════════════
let WOC=null, WX2=null;
let WCX=null, WCY=null;  // cam position when world was last drawn
const WPAD = 8;           // tile padding around viewport

function needRebuild() {
  if (!WOC || WCX===null || worldDirty) return true;
  return Math.abs(CAM.wx-WCX)>3 || Math.abs(CAM.wy-WCY)>3;
}

function rebuildWorld() {
  worldDirty = false;
  WCX = CAM.wx; WCY = CAM.wy;

  const OW = W + WPAD*TW*2;
  const OH = H + WPAD*(TH+WALLY)*2;

  if (!WOC || WOC.width!==OW || WOC.height!==OH) {
    WOC = document.createElement('canvas');
    WOC.width=OW; WOC.height=OH;
    WX2 = WOC.getContext('2d');
  }
  WX2.clearRect(0,0,OW,OH);

  const PW=TW+4, PH=TH+WALLY+6;
  // offset so screen-center of world canvas = screen-center
  const bx = OW/2 - W/2;
  const by = OH/2 - H/2;

  // cull bounds in tile coords
  const cullW = OW/(TWH) + 2;
  const cullH = OH/(THH) + 4;

  for (const tile of TILES) {
    const rdx = tile.x - WCX, rdy = tile.y - WCY;
    const sx = rdx-rdy, sy = rdx+rdy;
    if (Math.abs(sx)>cullW || Math.abs(sy)>cullH) continue;

    const px = W/2 + rdx*TWH - rdy*TWH + bx;
    const py = H/2 + rdx*THH + rdy*THH + by;
    WX2.drawImage(SPR[tile.t], px-PW/2, py-THH-3);
  }
}

// ═══════════════════════════════════════════════════════
// WALKABLE
// ═══════════════════════════════════════════════════════
function canWalk(wx, wy) {
  const M = 0.3;
  for (const [dx,dy] of [[0,0],[M,0],[-M,0],[0,M],[0,-M]]) {
    const t = TMAP.get(Math.round(wx+dx)+','+Math.round(wy+dy));
    if (t===undefined || t===2) return false;
  }
  return true;
}

// ═══════════════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════════════
let PARTS = [];
function spawnBurst(sx,sy,col,n=14,sp=2.2) {
  for (let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, s=Math.random()*sp+.4;
    PARTS.push({
      x:sx, y:sy, vx:Math.cos(a)*s, vy:Math.sin(a)*s-1,
      r:Math.random()*2+.4, a:0.8, col,
      life:Math.random()*20+20, maxLife:40
    });
  }
}

// ═══════════════════════════════════════════════════════
// ATTACK
// ═══════════════════════════════════════════════════════
function doAttack() {
  if (P.atkT>0 || P.dead || !gameOn) return;
  P.atkT = 16;
  // check hit at frame 8
}
function updateAttack() {
  if (P.atkT<=0) return;
  P.atkT--;
  if (P.atkT===8) {
    const adx=P.lastDx||1, ady=P.lastDy||0;
    const alen=Math.sqrt(adx*adx+ady*ady)||1;
    for (const e of ENEMIES) {
      if (!e.alive) continue;
      const dx=e.wx-P.wx, dy=e.wy-P.wy;
      const dist2=dx*dx+dy*dy;
      if (dist2 < 2.5*2.5) {
        // dot product check — must be roughly in facing direction
        const dot=(dx/Math.sqrt(dist2))*(adx/alen)+(dy/Math.sqrt(dist2))*(ady/alen);
        if (dot < -0.2) continue; // behind player
        e.hp--; e.hitT=12;
        const s=w2s(e.wx-CAM.wx, e.wy-CAM.wy);
        spawnBurst(s.x, s.y-PLIFT, '#c06840', 10, 2);
        if (e.hp<=0) {
          e.alive=false;
          spawnBurst(s.x, s.y-PLIFT, '#401820', 20, 3);
        }
      }
    }
  }
}

// ═══════════════════════════════════════════════════════
// FRAGMENT COLLECT
// ═══════════════════════════════════════════════════════
let ftimer=0, fdata=null;
const ftextEl = document.getElementById('ftext');

function checkFragments() {
  for (const f of FRAGS) {
    if (f.collected) continue;
    if ((P.wx-f.wx)**2+(P.wy-f.wy)**2 < 0.8) {
      f.collected=true;
      document.getElementById('d'+f.id).classList.add('lit');
      fdata=f; ftimer=230;
      const s=w2s(f.wx-CAM.wx, f.wy-CAM.wy);
      spawnBurst(s.x, s.y-PLIFT-16, '#c8a84a', 16, 2.2);
    }
  }
}
function updateFragText() {
  if (ftimer<=0) { ftextEl.style.opacity='0'; return; }
  ftimer--;
  if (fdata) {
    const sub = fdata.sub.replace(/\n/g,'<br>');
    ftextEl.innerHTML = `${fdata.text}<br><small>${sub}</small>`;
    const fade = ftimer>185 ? (230-ftimer)/45 : ftimer<50 ? ftimer/50 : 1;
    ftextEl.style.opacity = fade;
  }
}

// ═══════════════════════════════════════════════════════
// ZONE NAME
// ═══════════════════════════════════════════════════════
const ZONES = [
  { test: p=>p.wx< 11 && p.wy>-11 && p.wy<11,  name:'the hall of adjustment' },
  { test: p=>p.wx>=11 && p.wx<44,                name:'the bridge of legibility' },
  { test: p=>p.wx>=44 && p.wx<79,                name:'the chamber of held breath' },
  { test: p=>p.wx>=79,                            name:'the weight' },
  { test: p=>p.wy<-10 && p.wx<12,                name:'the passage of calibration' },
  { test: p=>p.wy>10  && p.wx<12,                name:'the archive' },
  { test: p=>p.wx<-10,                            name:'the left room' },
];
let lastZone='';
const zoneEl = document.getElementById('zone');
function updateZone() {
  for (const z of ZONES) {
    if (z.test(P)) {
      if (z.name !== lastZone) {
        lastZone = z.name;
        zoneEl.textContent = z.name;
        zoneEl.style.opacity='.6';
        setTimeout(()=>zoneEl.style.opacity='0', 3000);
      }
      return;
    }
  }
}

// ═══════════════════════════════════════════════════════
// DRAW PLAYER
// ═══════════════════════════════════════════════════════
function drawPlayer(sx, sy, alpha=1, scale=1) {
  const h=44*scale, w=21*scale;
  const py = sy;
  X.save();
  X.globalAlpha = alpha;

  // glow
  const gl = X.createRadialGradient(sx,py,0,sx,py,h*1.1);
  gl.addColorStop(0,'rgba(70,50,120,.1)');
  gl.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=gl; X.beginPath(); X.arc(sx,py,h*1.1,0,Math.PI*2); X.fill();

  // cloak body
  X.fillStyle = P.invT>0 && Math.floor(P.invT/5)%2===0 ? '#2a0818' : '#0e0c18';
  X.beginPath();
  X.moveTo(sx, py-h*.5);
  X.bezierCurveTo(sx+w*.5, py-h*.38, sx+w*.75, py+h*.1, sx+w*.15, py+h*.5);
  X.lineTo(sx-w*.15, py+h*.5);
  X.bezierCurveTo(sx-w*.75, py+h*.1, sx-w*.5, py-h*.38, sx, py-h*.5);
  X.fill();

  // horns
  X.fillStyle='#09080f';
  X.beginPath(); X.moveTo(sx-w*.18,py-h*.38); X.lineTo(sx-w*.30,py-h*.65); X.lineTo(sx-w*.05,py-h*.34); X.fill();
  X.beginPath(); X.moveTo(sx+w*.18,py-h*.38); X.lineTo(sx+w*.30,py-h*.65); X.lineTo(sx+w*.05,py-h*.34); X.fill();

  // eye
  const shimmer = Math.sin(Date.now()*.002)*.3+.7;
  X.fillStyle=`rgba(175,155,255,${.88*shimmer})`;
  X.beginPath(); X.arc(sx, py-h*.2, 2.4*scale, 0, Math.PI*2); X.fill();
  X.fillStyle='rgba(255,255,255,.6)';
  X.beginPath(); X.arc(sx, py-h*.2, .9*scale, 0, Math.PI*2); X.fill();

  // sword
  if (P.atkT>0) {
    const prog = 1-(P.atkT/16);
    const ang  = -Math.PI*.65 + prog*Math.PI*1.2;
    X.save();
    X.translate(sx + Math.cos(ang)*26*scale, py-h*.15 + Math.sin(ang)*18*scale);
    X.rotate(ang + Math.PI*.3);
    // blade gradient
    const sg=X.createLinearGradient(0,-26*scale,0,5*scale);
    sg.addColorStop(0,'rgba(230,210,160,.92)'); sg.addColorStop(1,'rgba(90,70,50,.35)');
    X.fillStyle=sg; X.fillRect(-1.4*scale,-26*scale,2.8*scale,31*scale);
    // guard
    X.fillStyle='rgba(150,120,70,.65)';
    X.fillRect(-6*scale,2*scale,12*scale,3*scale);
    // tip glow
    X.globalAlpha=(0.4+prog*.5)*alpha;
    const tg=X.createRadialGradient(0,-26*scale,0,0,-26*scale,7);
    tg.addColorStop(0,'rgba(255,220,100,.7)'); tg.addColorStop(1,'rgba(255,200,80,0)');
    X.fillStyle=tg; X.beginPath(); X.arc(0,-26*scale,7,0,Math.PI*2); X.fill();
    X.restore();
  } else {
    // sword at rest on back
    X.save(); X.globalAlpha=.25*alpha;
    X.translate(sx+w*.28, py-h*.08); X.rotate(.38);
    X.fillStyle='#a0905a';
    X.fillRect(-1,-h*.55,2,h*.65);
    X.restore();
  }

  X.restore();
}

// ═══════════════════════════════════════════════════════
// DRAW ENEMY
// ═══════════════════════════════════════════════════════
function drawEnemy(e) {
  if (!e.alive) return;
  const s = w2s(e.wx-CAM.wx, e.wy-CAM.wy);
  const sx=s.x, sy=s.y-PLIFT;
  const flash = e.hitT>0;

  // shadow
  X.save(); X.globalAlpha=.18;
  const sg=X.createRadialGradient(sx,sy+PLIFT-4,0,sx,sy+PLIFT-4,16);
  sg.addColorStop(0,'rgba(0,0,0,.7)'); sg.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=sg; X.ellipse(sx,sy+PLIFT*.7,16,6,0,0,Math.PI*2); X.fill();
  X.restore();

  // body
  X.fillStyle = flash ? '#5a0a18' : '#180810';
  X.beginPath(); X.ellipse(sx,sy-4,11,16,0,0,Math.PI*2); X.fill();

  // eyes
  const ec = flash ? '#ff8090' : '#c02838';
  X.fillStyle=ec;
  X.beginPath(); X.arc(sx-4,sy-10,2.8,0,Math.PI*2); X.fill();
  X.beginPath(); X.arc(sx+4,sy-10,2.8,0,Math.PI*2); X.fill();
  X.fillStyle='rgba(255,100,120,.5)';
  X.beginPath(); X.arc(sx-4,sy-10,1.1,0,Math.PI*2); X.fill();
  X.beginPath(); X.arc(sx+4,sy-10,1.1,0,Math.PI*2); X.fill();

  // hp bar
  const bw=26;
  X.fillStyle='#200810'; X.fillRect(sx-bw/2,sy-26,bw,2.5);
  X.fillStyle='#a02030'; X.fillRect(sx-bw/2,sy-26,bw*(e.hp/e.maxHp),2.5);
}

// ═══════════════════════════════════════════════════════
// DRAW FRAGMENT ORB
// ═══════════════════════════════════════════════════════
function drawFragments() {
  const vpW = W/TWH + 6, vpH = H/THH + 10;
  for (const f of FRAGS) {
    if (f.collected) continue;
    const rdx=f.wx-CAM.wx, rdy=f.wy-CAM.wy;
    if (Math.abs(rdx-rdy)>vpW || Math.abs(rdx+rdy)>vpH) continue;
    f.phase+=.02;
    const s=w2s(f.wx-CAM.wx, f.wy-CAM.wy);
    const fx=s.x, fy=s.y-PLIFT-14;
    const pulse=Math.sin(f.phase)*.25+.75;

    const g=X.createRadialGradient(fx,fy,0,fx,fy,22);
    g.addColorStop(0,`rgba(210,185,90,${.22*pulse})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    X.fillStyle=g; X.beginPath(); X.arc(fx,fy,22,0,Math.PI*2); X.fill();

    X.save(); X.globalAlpha=.5*pulse;
    X.strokeStyle='#c8a840'; X.lineWidth=1;
    X.beginPath();
    X.moveTo(fx,fy-7); X.lineTo(fx+5,fy); X.lineTo(fx,fy+7); X.lineTo(fx-5,fy);
    X.closePath(); X.stroke();
    X.restore();
  }
}

// ═══════════════════════════════════════════════════════
// VIGNETTE (cached)
// ═══════════════════════════════════════════════════════
let VIG=null, VIGW=0, VIGH=0;
function drawVignette() {
  if (!VIG||VIGW!==W||VIGH!==H) {
    VIG=X.createRadialGradient(W/2,H/2,H*.06,W/2,H/2,H*.72);
    VIG.addColorStop(0,'rgba(0,0,0,0)');
    VIG.addColorStop(1,'rgba(0,0,0,.88)');
    VIGW=W; VIGH=H;
  }
  X.fillStyle=VIG; X.fillRect(0,0,W,H);
}

// ═══════════════════════════════════════════════════════
// DUST MOTES (screen-space, atmospheric)
// ═══════════════════════════════════════════════════════
const DUST = Array.from({length:30},()=>({
  x:Math.random()*W, y:Math.random()*H,
  vx:(Math.random()-.5)*.18, vy:-(Math.random()*.15+.04),
  r:Math.random()*1.1+.2, a:Math.random()*.08+.01,
  w:Math.random()*Math.PI*2
}));

// ═══════════════════════════════════════════════════════
// HURT / DEATH
// ═══════════════════════════════════════════════════════
let deathFlash=0;
function hurtPlayer() {
  if (P.invT>0||P.dead) return;
  P.hp--; P.invT=90;
  syncHearts();
  spawnBurst(W/2,H/2-PLIFT,'#c04050',10,2);
  if (P.hp<=0) {
    P.dead=true; P.deadT=70;
    spawnBurst(W/2,H/2-PLIFT,'#601020',28,3.5);
  }
}

// ═══════════════════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════════════════
let lastT=0, gameOn=false;

function update(dt) {
  const d = Math.min(dt,50)/1000;

  // death reset
  if (P.dead) {
    P.deadT--;
    deathFlash=15;
    if (P.deadT<=0) {
      P.dead=false; P.wx=0; P.wy=0; P.hp=P.maxHp; syncHearts();
      CAM.wx=0; CAM.wy=0;
      ENEMIES.forEach(e=>{e.alive=true;e.hp=e.maxHp;});
      worldDirty=true;
    }
    return;
  }
  if (P.invT>0) P.invT--;
  updateAttack();

  // movement
  const SPD = 3.0*d;
  let mx=0,my=0;
  if (K['ArrowUp']  ||K['KeyW']) { mx-=1;my-=1; }
  if (K['ArrowDown']||K['KeyS']) { mx+=1;my+=1; }
  if (K['ArrowLeft']||K['KeyA']) { mx-=1;my+=1; }
  if (K['ArrowRight']||K['KeyD']){ mx+=1;my-=1; }
  // joystick
  if (JOY.on) { mx+=JOY.x+JOY.y; my+=JOY.y-JOY.x; }

  const len=Math.sqrt(mx*mx+my*my);
  if (len>0) { mx=mx/len*SPD; my=my/len*SPD; P.lastDx=mx; P.lastDy=my; }

  if (mx && canWalk(P.wx+mx,P.wy)) P.wx+=mx;
  if (my && canWalk(P.wx,P.wy+my)) P.wy+=my;

  const moving=len>0;
  P.bob += moving?.15:.04;
  if (moving) {
    P.trail.push({wx:P.wx,wy:P.wy});
    if (P.trail.length>10) P.trail.shift();
  } else if (P.trail.length) P.trail.shift();

  // enemy AI (only when in viewport range)
  const VIEW=18;
  for (const e of ENEMIES) {
    if (!e.alive) continue;
    if (e.hitT>0) e.hitT--;
    const dx=P.wx-e.wx, dy=P.wy-e.wy;
    const dist2=dx*dx+dy*dy;
    if (dist2>VIEW*VIEW) continue;
    const dist=Math.sqrt(dist2);
    if (dist>0) {
      const espd=e.sp*d;
      if(canWalk(e.wx+dx/dist*espd,e.wy)) e.wx+=dx/dist*espd;
      if(canWalk(e.wx,e.wy+dy/dist*espd)) e.wy+=dy/dist*espd;
    }
    if (dist<1.1) hurtPlayer();
  }

  // camera smooth
  CAM.wx += (P.wx-CAM.wx)*.1;
  CAM.wy += (P.wy-CAM.wy)*.1;

  checkFragments();
  updateZone();

  // particles
  PARTS=PARTS.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.045; p.life--;
    p.a=0.8*(p.life/p.maxLife);
    return p.life>0;
  });
  // dust
  DUST.forEach(m=>{
    m.w+=.011; m.x+=m.vx+Math.sin(m.w)*.09; m.y+=m.vy;
    if(m.y<-8){m.y=H+8;m.x=Math.random()*W;}
    if(m.x<-8||m.x>W+8){m.x=Math.random()*W;m.y=Math.random()*H;}
  });
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function render() {
  X.clearRect(0,0,W,H);

  // background
  X.fillStyle='#020108'; X.fillRect(0,0,W,H);

  // dust motes
  X.fillStyle='#b8a848';
  for (const m of DUST) { X.globalAlpha=m.a; X.beginPath(); X.arc(m.x,m.y,m.r,0,Math.PI*2); X.fill(); }
  X.globalAlpha=1;

  // rebuild world if needed
  if (needRebuild()) { rebuildWorld(); }

  // blit world — with subpixel cam offset for smooth scroll
  const bx = WOC.width/2  - W/2;
  const by = WOC.height/2 - H/2;
  const fx = (CAM.wx-WCX)*TWH - (CAM.wy-WCY)*TWH;
  const fy = (CAM.wx-WCX)*THH + (CAM.wy-WCY)*THH;
  X.drawImage(WOC, -fx-bx, -fy-by);

  // entities painter's algo
  const pd=P.wx+P.wy;
  let drawnP=false;
  const bobY=Math.sin(P.bob)*2.4;

  const visEn=ENEMIES.filter(e=>{
    if(!e.alive)return false;
    const dx=e.wx-CAM.wx,dy=e.wy-CAM.wy;
    return Math.abs(dx-dy)<W/TWH+4 && Math.abs(dx+dy)<H/THH+8;
  }).sort((a,b)=>(a.wx+a.wy)-(b.wx+b.wy));
  let ei=0;

  for (const tile of TILES) {
    const rdx=tile.x-CAM.wx, rdy=tile.y-CAM.wy;
    if(Math.abs(rdx-rdy)>W/TWH+5||Math.abs(rdx+rdy)>H/THH+10) continue;
    const depth=tile.x+tile.y;
    while(ei<visEn.length && (visEn[ei].wx+visEn[ei].wy)<=depth) {
      const e=visEn[ei++];
      const s=w2s(e.wx-CAM.wx,e.wy-CAM.wy);
      drawEnemy(e);
    }
    if(!drawnP && depth>pd) {
      const s=w2s(P.wx-CAM.wx,P.wy-CAM.wy);
      // shadow
      X.save();X.globalAlpha=.22;
      const sg=X.createRadialGradient(s.x,s.y-4,0,s.x,s.y-4,18);
      sg.addColorStop(0,'rgba(0,0,0,.7)');sg.addColorStop(1,'rgba(0,0,0,0)');
      X.fillStyle=sg;X.ellipse(s.x,s.y-WALLY*.3,18,6,0,0,Math.PI*2);X.fill();
      X.restore();
      // trail
      P.trail.forEach((tr,i)=>{
        const ts=w2s(tr.wx-CAM.wx,tr.wy-CAM.wy);
        drawPlayer(ts.x,ts.y-PLIFT+bobY,(i/P.trail.length)*.07,.8);
      });
      drawPlayer(s.x, s.y-PLIFT+bobY);
      drawnP=true;
    }
  }
  while(ei<visEn.length){drawEnemy(visEn[ei++]);}
  if(!drawnP){
    const s=w2s(P.wx-CAM.wx,P.wy-CAM.wy);
    drawPlayer(s.x,s.y-PLIFT+Math.sin(P.bob)*2.4);
  }

  drawFragments();

  // particles
  for (const p of PARTS) {
    X.globalAlpha=p.a; X.fillStyle=p.col;
    X.beginPath(); X.arc(p.x,p.y,p.r,0,Math.PI*2); X.fill();
  }
  X.globalAlpha=1;

  drawVignette();

  // death/hit overlays
  if(deathFlash>0){
    X.fillStyle=`rgba(60,0,15,${deathFlash/15*.55})`;
    X.fillRect(0,0,W,H); deathFlash--;
  }
  if(P.invT>75){
    X.fillStyle=`rgba(150,0,30,${(P.invT-75)/15*.12})`;
    X.fillRect(0,0,W,H);
  }
}

// ═══════════════════════════════════════════════════════
// LOOP
// ═══════════════════════════════════════════════════════
function loop(ts) {
  requestAnimationFrame(loop);
  const dt=lastT?(ts-lastT):16; lastT=ts;
  if (!gameOn) return;
  update(dt); render(); updateFragText();
}
requestAnimationFrame(loop);

// ═══════════════════════════════════════════════════════
// START — animated transition
// ═══════════════════════════════════════════════════════
const intro  = document.getElementById('intro');
const flash  = document.getElementById('flash');
const hud    = document.getElementById('hud');

function startGame() {
  if (gameOn) return;
  // fullscreen
  const el=document.documentElement;
  const rf=el.requestFullscreen||el.webkitRequestFullscreen;
  if(rf) rf.call(el).catch(()=>{});
  if(screen.orientation?.lock) screen.orientation.lock('landscape').catch(()=>{});

  // transition: fade out intro → white flash → game
  intro.style.transition='opacity .5s ease';
  intro.style.opacity='0';

  setTimeout(()=>{
    intro.style.display='none';
    flash.style.transition='opacity .25s ease';
    flash.style.opacity='1';

    setTimeout(()=>{
      gameOn=true;
      flash.style.transition='opacity .7s ease';
      flash.style.opacity='0';
      setTimeout(()=>{
        hud.style.opacity='1';
      },500);
    },260);
  },500);
}

intro.addEventListener('click', startGame);
intro.addEventListener('touchend', e=>{ e.preventDefault(); startGame(); },{passive:false});

// ═══════════════════════════════════════════════════════
// JOYSTICK
// ═══════════════════════════════════════════════════════
if (TOUCH) {
  document.getElementById('joy').style.display='block';
  document.getElementById('abtn').style.display='flex';
}

const joyEl  = document.getElementById('joy');
const jknob  = document.getElementById('jknob');
const abtnEl = document.getElementById('abtn');
const JR=38; // max knob radius

function jMove(e) {
  const t=e.touches[0], r=joyEl.getBoundingClientRect();
  let dx=t.clientX-(r.left+r.width/2), dy=t.clientY-(r.top+r.height/2);
  const d=Math.sqrt(dx*dx+dy*dy);
  if(d>JR){dx=dx/d*JR;dy=dy/d*JR;}
  jknob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
  JOY.x=dx/JR; JOY.y=dy/JR; JOY.on=true;
}
joyEl.addEventListener('touchstart',e=>{e.preventDefault();jMove(e);},{passive:false});
joyEl.addEventListener('touchmove', e=>{e.preventDefault();jMove(e);},{passive:false});
joyEl.addEventListener('touchend',  e=>{
  e.preventDefault();
  JOY.x=0;JOY.y=0;JOY.on=false;
  jknob.style.transform='translate(-50%,-50%)';
},{passive:false});

abtnEl.addEventListener('touchstart',e=>{e.preventDefault();abtnEl.classList.add('active');doAttack();},{passive:false});
abtnEl.addEventListener('touchend',  e=>{e.preventDefault();abtnEl.classList.remove('active');},{passive:false});
</script>
